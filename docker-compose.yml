services:
  go-markdown-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: go-markdown-server-with-mermaid:local
    container_name: go-markdown-server-with-mermaid
    ports:
      - "8080:8080"
    volumes:
      - ./content:/content
    environment:
      - PORT=8080
      - CONTENT_DIR=/content
      # - HTTP_SECURITY_HEADERS=disable  # Set to "disable" to turn off security headers
    restart: unless-stopped
    # Security: Set security options
    security_opt:
      - no-new-privileges:true
